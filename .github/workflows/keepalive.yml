name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 9 */3 * *'  # Every 3 days at 9 AM UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  keepalive:
    name: Ping Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Supabase REST API
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://wdprtbmhekougwnkpcdu.supabase.co/rest/v1/community_panels?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkcHJ0Ym1oZWtvdWd3bmtwY2R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwNTMyNDQsImV4cCI6MjA4NTYyOTI0NH0.WD5soMFrLGYzlEHjB6xYpRjq96v-9eCvglzo4v4nQ58" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkcHJ0Ym1oZWtvdWd3bmtwY2R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwNTMyNDQsImV4cCI6MjA4NTYyOTI0NH0.WD5soMFrLGYzlEHjB6xYpRjq96v-9eCvglzo4v4nQ58")
          echo "REST API response: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Supabase REST API returned $HTTP_CODE — project may be paused"
            exit 1
          fi
          echo "Supabase ping successful"
